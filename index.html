<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHA-256 Hash Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1de9b6 0%, #00c853 50%, #0d3820 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #00c853;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }

        textarea:focus, input[type="text"]:focus {
            outline: none;
            border-color: #00c853;
            box-shadow: 0 0 0 3px rgba(0, 200, 83, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input[type="text"][readonly] {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00c853 0%, #00a040 100%);
            color: white;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #00e676 0%, #00c853 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 200, 83, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #80cbc4 0%, #4db8a8 100%);
            color: white;
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #a1d5d0 0%, #66d9cf 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(128, 203, 196, 0.4);
        }

        .btn-secondary:active {
            transform: translateY(0);
        }

        .btn-copy {
            background: linear-gradient(135deg, #26a69a 0%, #1b8b85 100%);
            color: white;
            display: none;
        }

        .btn-copy.show {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-copy:hover {
            background: linear-gradient(135deg, #4db8b0 0%, #2fa59f 100%);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(38, 166, 154, 0.4);
        }

        .status-message {
            text-align: center;
            font-size: 13px;
            color: #00c853;
            margin-top: 5px;
            min-height: 20px;
            font-weight: 600;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            h1 {
                font-size: 24px;
            }

            .button-group {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 SHA-256 Hash Generator</h1>
        <p class="subtitle">Generate cryptographic hash of input text</p>

        <div class="form-group">
            <label for="inputText">Input Text:</label>
            <textarea id="inputText" placeholder="Enter text to hash..."></textarea>
        </div>

        <div class="button-group">
            <button class="btn-primary" onclick="generateHash()">Show Hash Value</button>
            <button class="btn-secondary" onclick="clearAll()">Clear</button>
            <button class="btn-copy" id="copyBtn" onclick="copyToClipboard()">📋 Copy Hash</button>
        </div>
        <div class="status-message" id="statusMessage"></div>

        <div class="form-group">
            <label for="outputHash">Hash Output (SHA-256):</label>
            <input type="text" id="outputHash" placeholder="Hash will appear here..." readonly>
        </div>
    </div>

    <script>
        function generateHash() {
            const inputText = document.getElementById('inputText').value;
            const statusMessage = document.getElementById('statusMessage');
            const copyBtn = document.getElementById('copyBtn');

            // Trim whitespace and non-printing characters
            const cleanedText = inputText.replace(/[\s\x00-\x1F\x7F-\x9F]/g, '');

            if (cleanedText.length === 0) {
                statusMessage.textContent = 'Please enter text to hash';
                document.getElementById('outputHash').value = '';
                copyBtn.classList.remove('show');
                return;
            }

            // Generate SHA-256 hash
            const hash = CryptoJS.SHA256(cleanedText).toString();
            document.getElementById('outputHash').value = hash;
            statusMessage.textContent = '✓ Hash generated successfully';
            copyBtn.classList.add('show');
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('outputHash').value = '';
            document.getElementById('statusMessage').textContent = '';
            document.getElementById('copyBtn').classList.remove('show');
            document.getElementById('inputText').focus();
        }

        function copyToClipboard() {
            const outputHash = document.getElementById('outputHash');
            const statusMessage = document.getElementById('statusMessage');

            if (!outputHash.value) return;

            navigator.clipboard.writeText(outputHash.value).then(() => {
                statusMessage.textContent = '✓ Hash copied to clipboard';
                setTimeout(() => {
                    statusMessage.textContent = '';
                }, 2000);
            }).catch(() => {
                statusMessage.textContent = '✗ Failed to copy hash';
            });
        }

        // Allow Enter key to generate hash
        document.getElementById('inputText').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                generateHash();
            }
        });

        // Focus on input field on page load
        window.addEventListener('load', () => {
            document.getElementById('inputText').focus();
        });
    </script>
</body>
</html>
